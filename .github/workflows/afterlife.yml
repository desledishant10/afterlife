name: Afterlife credential audit

# Runs the full Afterlife pipeline against a real AWS account, GitHub org,
# and Google Workspace customer, then uploads results to GitHub Code Scanning
# (via SARIF) and as a downloadable HTML report (artifact).
#
# Required configuration:
#   Repository secrets:
#     AFTERLIFE_AWS_ROLE_ARN        IAM role to assume via OIDC, with iam:Get*,
#                                   iam:List*, and access to credential reports.
#     AFTERLIFE_GH_TOKEN            Fine-grained PAT with org:read, repo
#                                   administration:read, repo metadata:read.
#     AFTERLIFE_GOOGLE_SA_JSON      Full service account JSON, single-line.
#   Repository variables:
#     AFTERLIFE_GH_ORG              GitHub org slug to scan.
#     AFTERLIFE_GOOGLE_ADMIN        Super-admin email to impersonate.

on:
  schedule:
    # Mondays at 14:00 UTC (early morning US Pacific time).
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write          # for AWS OIDC role assumption
  security-events: write   # for SARIF upload

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Afterlife
        run: pip install -e .

      - name: Initialize database
        run: afterlife init

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AFTERLIFE_AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Scan AWS
        run: afterlife scan aws

      - name: Scan GitHub organization
        env:
          GITHUB_TOKEN: ${{ secrets.AFTERLIFE_GH_TOKEN }}
          GITHUB_ORG: ${{ vars.AFTERLIFE_GH_ORG }}
        run: afterlife scan github --token "$GITHUB_TOKEN" --org "$GITHUB_ORG"

      - name: Scan Google Workspace
        env:
          GOOGLE_SA_JSON: ${{ secrets.AFTERLIFE_GOOGLE_SA_JSON }}
          GOOGLE_ADMIN: ${{ vars.AFTERLIFE_GOOGLE_ADMIN }}
        run: |
          echo "$GOOGLE_SA_JSON" > "$RUNNER_TEMP/sa.json"
          afterlife scan idp \
            --provider google \
            --service-account-file "$RUNNER_TEMP/sa.json" \
            --admin-email "$GOOGLE_ADMIN"
          rm -f "$RUNNER_TEMP/sa.json"

      - name: Run detection rules
        run: afterlife analyze

      - name: Generate SARIF report
        run: afterlife report --format sarif -o afterlife.sarif

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: afterlife.sarif
          category: afterlife

      - name: Generate HTML report
        if: always()
        run: afterlife report --format html -o afterlife-report.html

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: afterlife-report
          path: afterlife-report.html
          retention-days: 30
