<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>{% block title %}Afterlife{% endblock %}</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js" defer></script>
</head>
<body>
<nav>
  <span class="brand">Afterlife <span class="version">v{{ version }}</span></span>
  <a class="tab {% if request.url.path == '/' %}active{% endif %}" href="/">Overview</a>
  <a class="tab {% if request.url.path.startswith('/findings') %}active{% endif %}" href="/findings">Findings</a>
  <a class="tab {% if request.url.path.startswith('/credentials') %}active{% endif %}" href="/credentials">Credentials</a>
  <a class="tab {% if request.url.path.startswith('/identities') or request.url.path.startswith('/persons') %}active{% endif %}" href="/identities">Identities</a>
</nav>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
