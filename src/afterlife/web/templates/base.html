<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Afterlife{% endblock %}</title>
<style>
  :root {
    --bg: #fafafa;
    --fg: #1a1a1a;
    --muted: #6a6a6a;
    --border: #e0e0e0;
    --critical: #b71c1c;
    --high: #ad1457;
    --medium: #e65100;
    --low: #1565c0;
    --link: #2e7d32;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0;
    line-height: 1.5;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  nav {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }
  nav .brand {
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--fg);
  }
  nav .brand .version {
    color: var(--muted);
    font-size: 0.75rem;
    font-weight: 400;
    margin-left: 0.25rem;
  }
  nav a.tab {
    color: var(--muted);
    padding: 0.25rem 0;
    border-bottom: 2px solid transparent;
    text-decoration: none;
  }
  nav a.tab:hover { color: var(--fg); }
  nav a.tab.active { color: var(--fg); border-bottom-color: var(--fg); }
  main {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem 4rem;
  }
  h1 { margin-bottom: 0.25rem; font-size: 1.6rem; }
  .meta { color: var(--muted); font-size: 0.875rem; margin-bottom: 2rem; }
  h2 { margin-top: 2.5rem; margin-bottom: 1rem; font-size: 1.2rem; }
  .badge {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 3px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
    color: white;
  }
  .badge.critical { background: var(--critical); }
  .badge.high { background: var(--high); }
  .badge.medium { background: var(--medium); }
  .badge.low { background: var(--low); }
  .blast {
    display: inline-block;
    padding: 0.125rem 0.5rem;
    border-radius: 3px;
    font-size: 0.7rem;
    font-weight: 500;
    border: 1px solid var(--border);
    color: var(--muted);
    background: white;
  }
  .blast.broad { border-color: var(--critical); color: var(--critical); }
  .blast.moderate { border-color: var(--medium); color: var(--medium); }
  .blast.limited { border-color: var(--low); color: var(--low); }
  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
  }
  .row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .row > * { flex: 1; min-width: 180px; }
  .metric {
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    text-align: center;
  }
  .metric .count {
    font-size: 1.8rem;
    font-weight: 600;
    display: block;
    line-height: 1;
  }
  .metric.critical .count { color: var(--critical); }
  .metric.high .count { color: var(--high); }
  .metric.medium .count { color: var(--medium); }
  .metric.low .count { color: var(--low); }
  .metric .label {
    color: var(--muted);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-top: 0.5rem;
    display: block;
  }
  .filter-bar {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
    align-items: center;
    background: white;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.75rem;
  }
  .filter-bar form { display: flex; gap: 0.5rem; align-items: center; }
  .filter-bar select {
    padding: 0.25rem 0.5rem;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: white;
  }
  .filter-bar .clear { color: var(--muted); margin-left: auto; }
  details.finding {
    background: white;
    border: 1px solid var(--border);
    border-left: 4px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
  }
  details.finding.critical { border-left-color: var(--critical); }
  details.finding.high { border-left-color: var(--high); }
  details.finding.medium { border-left-color: var(--medium); }
  details.finding.low { border-left-color: var(--low); }
  details.finding summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-wrap: wrap;
  }
  details.finding summary::-webkit-details-marker { display: none; }
  details.finding summary::before {
    content: "▸";
    color: var(--muted);
    transition: transform 0.1s;
  }
  details.finding[open] summary::before { transform: rotate(90deg); }
  .rule-id {
    font-family: var(--mono);
    color: var(--muted);
    font-size: 0.8rem;
    margin-left: auto;
  }
  details.finding .body {
    margin-top: 0.75rem;
    padding-top: 0.75rem;
    border-top: 1px solid var(--border);
  }
  h4 {
    margin-top: 1rem;
    margin-bottom: 0.25rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }
  pre {
    background: #f5f5f5;
    padding: 0.75rem;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.8rem;
    overflow-x: auto;
    margin: 0;
  }
  .factors { color: var(--muted); font-size: 0.85rem; font-style: italic; }
  .person {
    background: white;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
  }
  .person.cross-source { border-left: 4px solid var(--link); }
  .person-header { font-weight: 500; }
  .person-tag {
    color: var(--link);
    font-size: 0.75rem;
    margin-left: 0.5rem;
    font-weight: normal;
  }
  .identity-row {
    font-family: var(--mono);
    font-size: 0.825rem;
    color: var(--muted);
    margin-top: 0.25rem;
  }
  .identity-row .src {
    display: inline-block;
    min-width: 4.5rem;
    color: var(--fg);
  }
  .identity-row .status-suspended,
  .identity-row .status-archived,
  .identity-row .status-deprovisioned { color: var(--critical); }
  .empty {
    color: var(--muted);
    font-style: italic;
    padding: 1rem;
    background: white;
    border: 1px dashed var(--border);
    border-radius: 4px;
    text-align: center;
  }
</style>
</head>
<body>
<nav>
  <span class="brand">Afterlife <span class="version">v{{ version }}</span></span>
  <a class="tab {% if request.url.path == '/' %}active{% endif %}" href="/">Overview</a>
  <a class="tab {% if request.url.path.startswith('/findings') %}active{% endif %}" href="/findings">Findings</a>
  <a class="tab {% if request.url.path.startswith('/identities') %}active{% endif %}" href="/identities">Identities</a>
</nav>
<main>
{% block content %}{% endblock %}
</main>
</body>
</html>
